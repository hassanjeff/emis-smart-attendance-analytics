<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | EMIS SEDGB</title>

<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
[data-theme="light"]{
  --bg:#eef2f7;--surface:#fff;--surface-2:#f8fafc;--surface-3:#f1f5f9;
  --border:#e2e8f0;--text-1:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --primary:#1a56db;--primary-dark:#1e40af;--primary-light:#dbeafe;
  --danger:#dc2626;--danger-light:#fee2e2;
  --accent:#059669;--accent-light:#d1fae5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text-1);
  min-height:100vh;font-size:14px;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.login-shell{width:100%;max-width:400px}

.brand-header{
  background:linear-gradient(135deg,#1e3a5f 0%,#1a56db 100%);
  color:#fff;border-radius:14px 14px 0 0;padding:28px 30px 24px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px rgba(0,0,0,.15);
}
.brand-logo{
  width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;
  border:1px solid rgba(255,255,255,.2);text-align:center;line-height:1.3;flex-shrink:0;
}
.brand-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:11px;opacity:.75;margin-top:2px}

.login-card{
  background:var(--surface);border-radius:0 0 14px 14px;padding:30px;
  box-shadow:0 8px 30px rgba(0,0,0,.1);border:1px solid var(--border);border-top:none;
}

.login-card h2{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text-1)}
.login-card .lead{font-size:12px;color:var(--text-2);margin-bottom:22px}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.fg label{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.fg input{
  border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;
  font-family:inherit;color:var(--text-1);background:var(--surface-2);outline:none;transition:.15s;
}
.fg input:focus{border-color:var(--primary)}

.btn-login{
  width:100%;background:var(--primary);color:#fff;padding:11px;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.2s;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{background:var(--primary-dark)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}

.spinner{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

.alert{
  display:none;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:600;
  margin-bottom:16px;align-items:center;gap:8px;
}
.alert.error{background:var(--danger-light);color:#991b1b;display:flex}
.alert.info{background:var(--primary-light);color:#1e40af;display:flex}

.footer-note{
  text-align:center;font-size:10px;color:var(--text-3);margin-top:16px;line-height:1.6;
}
</style>
</head>
<body>

<div class="login-shell">
  <div class="brand-header">
    <div class="brand-logo">EMIS<br>SEDGB</div>
    <div>
      <div class="brand-title">EMIS SEDGB</div>
      <div class="brand-sub">School Education Department — Gilgit-Baltistan</div>
    </div>
  </div>

  <div class="login-card">
    <h2>Sign in to your account</h2>
    <p class="lead">Access the attendance monitoring dashboard</p>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert info" id="infoAlert"></div>

    <form id="loginForm">
      <div class="fg">
        <label>Email</label>
        <input type="email" id="email" autocomplete="username" required placeholder="you@gb.gov.pk">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner" id="loginSpinner"></div>
        <span id="loginBtnText">Sign In</span>
      </button>
    </form>

    <div class="footer-note">
      Access is provisioned by the EMIS Section.<br>
      Contact your administrator if you need an account or a password reset.
    </div>
  </div>
</div>

<script>
// ── Supabase config ────────────────────────────────────────
// Replace these two values with your actual Supabase project credentials
// (Supabase Dashboard → Project Settings → API)
const SUPABASE_URL = 'https://gjdolrzevbnvgmilakqv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_deU76u9KVnUMeCZLTgvgbg_iAlXC2NX';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('loginForm');
const errorAlert = document.getElementById('errorAlert');
const infoAlert = document.getElementById('infoAlert');
const loginBtn = document.getElementById('loginBtn');
const loginSpinner = document.getElementById('loginSpinner');
const loginBtnText = document.getElementById('loginBtnText');

function showError(msg){
  errorAlert.textContent = msg;
  errorAlert.style.display = 'flex';
  infoAlert.style.display = 'none';
}
function showInfo(msg){
  infoAlert.textContent = msg;
  infoAlert.style.display = 'flex';
  errorAlert.style.display = 'none';
}
function setLoading(isLoading){
  loginBtn.disabled = isLoading;
  loginSpinner.style.display = isLoading ? 'block' : 'none';
  loginBtnText.textContent = isLoading ? 'Signing in…' : 'Sign In';
}

// If already logged in, skip straight to dashboard
(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    window.location.href = 'index.html';
  }
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorAlert.style.display = 'none';
  infoAlert.style.display = 'none';
  setLoading(true);

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  setLoading(false);

  if (error) {
    showError(error.message === 'Invalid login credentials'
      ? 'Incorrect email or password. Please try again.'
      : error.message);
    return;
  }

  if (data.session) {
    showInfo('Signed in — redirecting…');
    setTimeout(() => { window.location.href = 'index.html'; }, 400);
  }
});
</script>
</body>
</html>
