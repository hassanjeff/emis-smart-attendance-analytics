<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management | EMIS SEDGB</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
[data-theme="light"]{
  --bg:#eef2f7;--surface:#fff;--surface-2:#f8fafc;--surface-3:#f1f5f9;
  --border:#e2e8f0;--text-1:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --primary:#1a56db;--primary-dark:#1e40af;--primary-light:#dbeafe;
  --accent:#059669;--accent-light:#d1fae5;
  --warning:#d97706;--warning-light:#fef3c7;
  --danger:#dc2626;--danger-light:#fee2e2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit;border:none;outline:none}

.topbar{background:linear-gradient(135deg,#1e3a5f 0%,#1a56db 100%);color:#fff;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;border:1px solid rgba(255,255,255,.2);text-align:center;line-height:1.3;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:10px;opacity:.7;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:12px}
.back-link{color:#fff;text-decoration:none;font-size:12px;font-weight:600;background:rgba(255,255,255,.12);padding:6px 12px;border-radius:6px}
.back-link:hover{background:rgba(255,255,255,.22)}
#logoutBtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit}

.main{max-width:1100px;margin:0 auto;padding:22px 20px}
.section-title{font-size:14px;font-weight:700;color:var(--text-1);margin:24px 0 12px;display:flex;align-items:center;gap:8px}

.card{background:var(--surface);border-radius:11px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text-1);background:var(--surface-2);outline:none}
.fg input:focus,.fg select:focus{border-color:var(--primary)}

.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;transition:.15s;cursor:pointer;border:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:var(--surface-3);color:var(--text-1);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-danger{background:var(--danger-light);color:#991b1b}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:4px 10px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}

table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#1e3a5f;color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:rgba(26,86,219,.05)}
tbody td{padding:9px 12px;color:var(--text-1);vertical-align:middle}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:11px;font-size:10px;font-weight:700}
.b-green{background:#d1fae5;color:#065f46}.b-blue{background:#dbeafe;color:#1e40af}.b-red{background:#fee2e2;color:#991b1b}.b-gray{background:var(--surface-3);color:var(--text-2)}

.alert{border-radius:8px;padding:10px 13px;font-size:12px;font-weight:600;margin-bottom:16px;display:none;align-items:center;gap:8px}
.alert.error{background:var(--danger-light);color:#991b1b}
.alert.success{background:var(--accent-light);color:#065f46}

.action-cell{display:flex;gap:5px;flex-wrap:wrap}
.empty-note{color:var(--text-2);font-size:12px;padding:20px;text-align:center}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.district-fg{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">EMIS<br>SEDGB</div>
    <div><div class="topbar-title">User Management</div><div class="topbar-sub">Superadmin only — create and manage dashboard accounts</div></div>
  </div>
  <div class="topbar-right">
    <a href="index.html" class="back-link">← Back to Dashboard</a>
    <span id="callerEmail" style="opacity:.85"></span>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<div class="main">

  <div class="alert error" id="errorAlert"></div>
  <div class="alert success" id="successAlert"></div>

  <div class="section-title">➕ Create New User</div>
  <div class="card">
    <div class="form-grid">
      <div class="fg"><label>Full Name</label><input type="text" id="newFullName" placeholder="DD Ghanche"></div>
      <div class="fg"><label>Email</label><input type="email" id="newEmail" placeholder="ddghanche@emis.gov.pk"></div>
      <div class="fg"><label>Temporary Password</label><input type="text" id="newPassword" placeholder="min. 6 characters"></div>
      <div class="fg">
        <label>Role</label>
        <select id="newRole" onchange="toggleDistrictField('newRole','newDistrictFg')">
          <option value="">-- Select --</option>
          <option value="superadmin">Superadmin</option>
          <option value="district_admin">District Admin</option>
        </select>
      </div>
      <div class="fg district-fg" id="newDistrictFg">
        <label>District</label>
        <select id="newDistrict">
          <option value="">-- Select --</option>
          <option>Gilgit</option><option>Ghanche</option><option>Skardu</option><option>Shigar</option>
          <option>Kharmang</option><option>Hunza</option><option>Nagar</option><option>Ghizer</option>
          <option>Diamer</option><option>Astore</option>
        </select>
      </div>
      <div class="fg">
        <button class="btn btn-primary" id="createBtn" onclick="createUser()">
          <div class="spinner" id="createSpinner"></div>
          <span id="createBtnText">Create User</span>
        </button>
      </div>
    </div>
  </div>

  <div class="section-title">👥 All Users</div>
  <div class="card" style="padding:0">
    <div style="overflow-x:auto">
      <table id="usersTable">
        <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Role</th><th>District</th><th>Status</th><th>Created</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="7" class="empty-note">Loading users…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://gjdolrzevbnvgmilakqv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_deU76u9KVnUMeCZLTgvgbg_iAlXC2NX';
const EDGE_FUNCTION_URL = SUPABASE_URL + '/functions/v1/manage-users';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentSession = null;
let usersCache = [];

function showError(msg){
  const el = document.getElementById('errorAlert');
  el.textContent = msg; el.style.display = 'flex';
  document.getElementById('successAlert').style.display = 'none';
}
function showSuccess(msg){
  const el = document.getElementById('successAlert');
  el.textContent = msg; el.style.display = 'flex';
  document.getElementById('errorAlert').style.display = 'none';
}
function toggleDistrictField(roleId, fgId){
  document.getElementById(fgId).style.display =
    document.getElementById(roleId).value === 'district_admin' ? 'flex' : 'none';
}

async function callFunction(payload){
  const res = await fetch(EDGE_FUNCTION_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + currentSession.access_token,
    },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function loadUsers(){
  try{
    const { users } = await callFunction({ action: 'list' });
    usersCache = users;
    renderUsers();
  }catch(e){
    showError('Could not load users: ' + e.message);
    document.getElementById('usersBody').innerHTML =
      '<tr><td colspan="7" class="empty-note">Failed to load users.</td></tr>';
  }
}

function renderUsers(){
  const tbody = document.getElementById('usersBody');
  if (!usersCache.length){
    tbody.innerHTML = '<tr><td colspan="7" class="empty-note">No users found.</td></tr>';
    return;
  }
  tbody.innerHTML = usersCache.map(u => {
    const roleBadge = u.role === 'superadmin'
      ? '<span class="badge b-blue">Superadmin</span>'
      : u.role === 'district_admin'
        ? '<span class="badge b-green">District Admin</span>'
        : '<span class="badge b-gray">No role</span>';
    const statusBadge = u.banned
      ? '<span class="badge b-red">Disabled</span>'
      : '<span class="badge b-green">Active</span>';
    const created = new Date(u.created_at).toLocaleDateString();
    return `<tr>
      <td>${u.full_name || '<span style="color:var(--text-3)">—</span>'}</td>
      <td>${u.email}</td>
      <td>${roleBadge}</td>
      <td>${u.district || '—'}</td>
      <td>${statusBadge}</td>
      <td>${created}</td>
      <td class="action-cell">
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${u.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="resetPassword('${u.id}','${u.email}')">Reset PW</button>
        <button class="btn ${u.banned ? 'btn-ghost' : 'btn-danger'} btn-sm" onclick="toggleBan('${u.id}', ${!u.banned})">
          ${u.banned ? 'Enable' : 'Disable'}
        </button>
      </td>
    </tr>`;
  }).join('');
}

async function createUser(){
  const full_name = document.getElementById('newFullName').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  const district = document.getElementById('newDistrict').value;

  if (!email || !password || !role){
    showError('Email, password, and role are required.');
    return;
  }
  if (role === 'district_admin' && !district){
    showError('Please select a district for a District Admin account.');
    return;
  }
  if (password.length < 6){
    showError('Password must be at least 6 characters.');
    return;
  }

  const btn = document.getElementById('createBtn');
  const spinner = document.getElementById('createSpinner');
  const btnText = document.getElementById('createBtnText');
  btn.disabled = true; spinner.style.display = 'block'; btnText.textContent = 'Creating…';

  try{
    await callFunction({ action: 'create', email, password, full_name, role, district });
    showSuccess('User created: ' + email);
    document.getElementById('newFullName').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newRole').value = '';
    document.getElementById('newDistrict').value = '';
    toggleDistrictField('newRole','newDistrictFg');
    loadUsers();
  }catch(e){
    showError('Could not create user: ' + e.message);
  }finally{
    btn.disabled = false; spinner.style.display = 'none'; btnText.textContent = 'Create User';
  }
}

function openEdit(userId){
  const u = usersCache.find(x => x.id === userId);
  if (!u) return;
  const newRole = prompt('Role for ' + u.email + ' ("superadmin" or "district_admin"):', u.role || '');
  if (newRole === null) return;
  if (!['superadmin','district_admin'].includes(newRole)){
    showError('Role must be exactly "superadmin" or "district_admin".');
    return;
  }
  let district = u.district || '';
  if (newRole === 'district_admin'){
    district = prompt('District (must exactly match: Gilgit, Ghanche, Skardu, Shigar, Kharmang, Hunza, Nagar, Ghizer, Diamer, Astore):', district || '');
    if (district === null) return;
  }
  const full_name = prompt('Full name:', u.full_name || '') ?? u.full_name;

  callFunction({ action: 'update', user_id: userId, role: newRole, district, full_name })
    .then(() => { showSuccess('Updated ' + u.email); loadUsers(); })
    .catch(e => showError('Update failed: ' + e.message));
}

function resetPassword(userId, email){
  const pw = prompt('New temporary password for ' + email + ' (min. 6 characters):');
  if (!pw) return;
  if (pw.length < 6){ showError('Password must be at least 6 characters.'); return; }
  callFunction({ action: 'setPassword', user_id: userId, password: pw })
    .then(() => showSuccess('Password reset for ' + email))
    .catch(e => showError('Reset failed: ' + e.message));
}

function toggleBan(userId, banned){
  if (!confirm((banned ? 'Disable' : 'Enable') + ' this account?')) return;
  callFunction({ action: 'setBanned', user_id: userId, banned })
    .then(() => { showSuccess('Account ' + (banned ? 'disabled' : 'enabled') + '.'); loadUsers(); })
    .catch(e => showError('Action failed: ' + e.message));
}

// ── Auth guard: superadmin only ──
(async function init(){
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session){ window.location.href = 'login.html'; return; }
  currentSession = session;

  const { data: profile, error } = await supabaseClient
    .from('profiles').select('role').eq('id', session.user.id).single();

  if (error || !profile || profile.role !== 'superadmin'){
    document.body.innerHTML =
      '<div style="max-width:480px;margin:80px auto;text-align:center;font-family:sans-serif">' +
      '<h2 style="margin-bottom:10px">Access restricted</h2>' +
      '<p style="color:#64748b;margin-bottom:20px">This page is only available to superadmins.</p>' +
      '<a href="index.html" style="color:#1a56db;font-weight:600">← Back to Dashboard</a></div>';
    return;
  }

  document.getElementById('callerEmail').textContent = session.user.email;
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });

  loadUsers();
})();
</script>
</body>
</html>
