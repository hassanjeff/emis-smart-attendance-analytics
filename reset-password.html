<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | EMIS SEDGB</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
[data-theme="light"]{
  --bg:#eef2f7;--surface:#fff;--surface-2:#f8fafc;--border:#e2e8f0;
  --text-1:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --primary:#1a56db;--primary-dark:#1e40af;--primary-light:#dbeafe;
  --danger:#dc2626;--danger-light:#fee2e2;--accent:#059669;--accent-light:#d1fae5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;font-size:14px;display:flex;align-items:center;justify-content:center;padding:20px}
.shell{width:100%;max-width:400px}
.brand-header{background:linear-gradient(135deg,#1e3a5f 0%,#1a56db 100%);color:#fff;border-radius:14px 14px 0 0;padding:28px 30px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px rgba(0,0,0,.15)}
.brand-logo{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;border:1px solid rgba(255,255,255,.2);text-align:center;line-height:1.3;flex-shrink:0}
.brand-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:11px;opacity:.75;margin-top:2px}
.card{background:var(--surface);border-radius:0 0 14px 14px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,.1);border:1px solid var(--border);border-top:none}
.card h2{font-size:15px;font-weight:700;margin-bottom:4px}
.card .lead{font-size:12px;color:var(--text-2);margin-bottom:22px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.fg label{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.fg input{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;background:var(--surface-2);outline:none}
.fg input:focus{border-color:var(--primary)}
.btn{width:100%;background:var(--primary);color:#fff;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--primary-dark)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{display:none;border-radius:8px;padding:10px 13px;font-size:12px;font-weight:600;margin-bottom:16px;align-items:center;gap:8px}
.alert.error{background:var(--danger-light);color:#991b1b;display:flex}
.alert.success{background:var(--accent-light);color:#065f46;display:flex}
.alert.info{background:var(--primary-light);color:#1e40af;display:flex}
a{color:var(--primary);font-weight:600;text-decoration:none}
</style>
</head>
<body>

<div class="shell">
  <div class="brand-header">
    <div class="brand-logo">EMIS<br>SEDGB</div>
    <div><div class="brand-title">EMIS SEDGB</div><div class="brand-sub">School Education Department — Gilgit-Baltistan</div></div>
  </div>

  <div class="card">
    <h2 id="cardTitle">Set a new password</h2>
    <p class="lead" id="cardLead">Choose a new password for your account.</p>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <div class="alert info" id="infoAlert"></div>

    <form id="resetForm" style="display:none">
      <div class="fg">
        <label>New Password</label>
        <input type="password" id="newPassword" required placeholder="min. 6 characters" autocomplete="new-password">
      </div>
      <div class="fg">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="repeat password" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">
        <div class="spinner" id="submitSpinner"></div>
        <span id="submitBtnText">Set New Password</span>
      </button>
    </form>

    <div id="expiredBox" style="display:none;text-align:center">
      <p style="color:var(--text-2);font-size:12px;margin-bottom:14px">This link is invalid or has expired. Reset links are only valid for a limited time.</p>
      <a href="login.html">← Back to Login</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gjdolrzevbnvgmilakqv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_deU76u9KVnUMeCZLTgvgbg_iAlXC2NX';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById('resetForm');
const expiredBox = document.getElementById('expiredBox');
const errorAlert = document.getElementById('errorAlert');
const successAlert = document.getElementById('successAlert');
const infoAlert = document.getElementById('infoAlert');

function showError(msg){ errorAlert.textContent = msg; errorAlert.style.display='flex'; successAlert.style.display='none'; infoAlert.style.display='none'; }
function showSuccess(msg){ successAlert.textContent = msg; successAlert.style.display='flex'; errorAlert.style.display='none'; infoAlert.style.display='none'; }

// Supabase's JS client automatically picks up the recovery token from the
// URL hash (#access_token=...&type=recovery) that the email link contains,
// and turns it into a temporary logged-in session — we just listen for that.
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    form.style.display = 'flex';
    form.style.flexDirection = 'column';
    expiredBox.style.display = 'none';
  }
});

// Fallback check: if no recovery event fires within a couple seconds
// (expired/invalid link, or page opened directly without a token), show
// the "link expired" state instead of leaving a blank form forever.
setTimeout(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (form.style.display === 'none' && !session) {
    expiredBox.style.display = 'block';
  }
}, 2500);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (pw.length < 6) { showError('Password must be at least 6 characters.'); return; }
  if (pw !== confirm) { showError('Passwords do not match.'); return; }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('submitSpinner');
  const btnText = document.getElementById('submitBtnText');
  btn.disabled = true; spinner.style.display = 'block'; btnText.textContent = 'Saving…';

  const { error } = await supabaseClient.auth.updateUser({ password: pw });

  btn.disabled = false; spinner.style.display = 'none'; btnText.textContent = 'Set New Password';

  if (error) { showError(error.message); return; }

  showSuccess('Password updated! Redirecting to login…');
  form.style.display = 'none';
  await supabaseClient.auth.signOut(); // clear the temporary recovery session
  setTimeout(() => { window.location.href = 'login.html'; }, 1800);
});
</script>
</body>
</html>
